<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Panel de Administración — Widows Sons Chapter Rio Cuareim</title>
  </head>
  <body>
    <script>
      // Forzamos la configuración del backend directamente en la ventana global
      // antes de que Decap CMS se ejecute e intente usar Vercel por defecto.
      window.CMS_MANUAL_INIT = true;
    </script>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // Inicializamos el CMS a mano pasándole tu dominio y endpoint de Cloudflare
      initCMS({
        config: {
          backend: {
            name: "github",
            repo: "estebanmenendez/ws_rio_cuareim",
            branch: "main",
            base_url: "https://www.wsriocuareim.com",
            auth_endpoint: "/callback"
          }
        }
      });
    </script>
  </body>
</html>
