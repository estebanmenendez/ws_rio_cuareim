site:
  name: Widows Sons Rio Uruguay
  site: 'https://www.wsriouruguay.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Metadatos SEO
metadata:
  title:
    default: Widows Sons — Capítulo Rio Uruguay
    template: '%s — Widows Sons'
  description: 'Sitio oficial de los Widows Sons, Capítulo Rio Uruguay. Fraternidad, motociclismo y caridad en el litoral uruguayo.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Widows Sons Rio Uruguay
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@widowssons'
    site: '@widowssons'
    cardType: summary_large_image

i18n:
  language: es
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

# Configuración de Interfaz: Forzado de Modo Oscuro
ui:
  theme: dark
  showThemeSwitcher: false
